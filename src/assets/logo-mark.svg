<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- CR monogram, hairline serif, ink on transparent -->
  <g stroke="#0A1628" stroke-width="2.5" stroke-linecap="butt" stroke-linejoin="miter" fill="none">
    <!-- C with bracket-style opening (eraser metaphor) -->
    <path d="M 28 14 C 18 14, 12 22, 12 32 C 12 42, 18 50, 28 50" />
    <!-- bracket cuts on C — open bracket inner -->
    <path d="M 22 22 L 18 22 L 18 42 L 22 42" />
    <!-- R -->
    <path d="M 36 14 L 36 50 M 36 14 L 46 14 C 51 14, 53 18, 53 22 C 53 26, 51 30, 46 30 L 36 30 M 44 30 L 53 50" />
  </g>
  <!-- Hairline divider beneath -->
  <line x1="14" y1="56" x2="50" y2="56" stroke="#B08D57" stroke-width="0.75" />
</svg>
